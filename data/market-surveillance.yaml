    link:
    g18_entry: '02212'
    definition: form of metrological supervision aimed at measuring instruments and
      prepackages intended to be placed on the market and/or put into service for
      the first time, to ensure that all the elements of the conformity assessment
      system function correctly, resulting in general compliance of the products with
      the provisions of the applicable regulations across a country or free trade
      area [OIML D 16, 2.23]
    notes:
    - 'Note 1: In the above definition the words “to be placed on the market and/or
      put into service” should be applied to describe different situations as follows:
      “to be placed on the market”: should be used in the case when all the relevant
      conformity assessment procedures are to be finalized before measuring instruments
      or prepackages are put into service; “to be placed on the market and put into
      service”: one or more conformity assessment procedures may be or have to be
      carried out when measuring instruments are put into service; “put into service”:
      to describe the situation when a manufacturer manufactures a measuring instrument
      to be used (it is not necessary to place it on the market). Note 2: Market surveillance
      is exerted by enforcement authorities for the purpose of detecting whether products
      placed on the national market (i.e. sold or offered for sale) fail to comply
      with the regulations that apply to them. Note 3: This must be distinguished
      from “field surveillance” which consists in a surveillance by enforcement authorities,
      that instruments in use in marketplaces (in the field) do comply with the requirements
      that apply to them (required characteristics, integrity, accuracy, proper use).'
    consistency: pending
