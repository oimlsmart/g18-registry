    notes:
    - 'Note 1: A reference quantity value can be a true quantity value of a measurand,
      in which case it is unknown, or a conventional quantity value, in which case
      it is known. Note 2: A reference quantity value with associated measurement
      uncertainty is usually provided with reference to a) a material, e.g. a certified
      reference material, b) a device, e.g. a stabilized laser, c) a reference measurement
      procedure, or d) a comparison of measurement standards.'
