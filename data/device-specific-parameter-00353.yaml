      span adjustments or other adjustments or corrections) and configuration parameters
      (e.g. maximum capacity, minimum capacity, units of measurement, etc.). They
      are adjustable or selectable only in a special operational mode of the instrument.
      Device specific parameters may be classified as those that should be secured
