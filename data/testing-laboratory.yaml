      samples of a measuring instrument submitted for evaluation, with the Issuing
      Authority assuming responsibility for the evaluation report"
    notes:
    - 1. When used in connection with the MAA, a Testing Laboratory may be part of
      the organization containing the OIML Issuing Authority, or a subcontracting
      Testing Laboratory of the OIML Issuing Authority.
    - 2. A Testing Laboratory may be a subcontractor of an inspection body.
