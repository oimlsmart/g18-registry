    year: 1988
    clause: 1.1.3
    link: https://www.oiml.org/en/files/pdf_D/d019-e88.pdf
    g18_entry: '00127'
    definition: an individual instrument which conforms, within specified limits,
      to a given pattern in all respects
    notes:
    - The word « pattern » has been commonly used to refer to the definitive model
      of a measuring instrument as well as to the class of instruments that conform
      to it. The instruments produced by the manufacturer to replicate the pattern
      constitute a different class. The question of whether an instrument of this
      class conforms to the pattern is normally the subject of initial verification.
      Pattern approval not only implies the recognition that the pattern conforms
      to requirements but, generally, also relates to th instruments of the class
      produced by the manufacturer; it usually conveys that these may be sold as legal
      for use and submitted for initial verification.
