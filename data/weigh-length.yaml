    definition: the distance between the two imaginary lines at the half distance
      between the axes of the end weighing rollers and the axes of the nearest carrying
      rollers. When there is only one weighing roller, the weigh length is equal to
      half the distance between the axes of the nearest carrying rollers on either
      side of the weighing roller
