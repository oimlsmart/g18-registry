    g18_entry: '01498'
    definition: the range of mass flow rates or concentrations of the sample component
      of interest over which an incremental change produces a measurable change in
      the detector output signal. Its upper limit is the highest mass flow rate or
      concentration at which a further increase in either flow rate or concentration
      will not give an observable increase in detector output signal. It is expressed
      as the ratio of its upper limit to the detection limit
