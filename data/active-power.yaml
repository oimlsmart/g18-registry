    definition: rate at which energy is transported
    notes:
    - 'Note:In an electrical system active power is measured as the time mean of the
      instantaneous power, which is calculated at each instant as the product of voltage
      and current: where:u is the instantaneous voltage,i is the instantaneous current,
      p is the instantaneous power. At sinusoidal conditions active power is the product
      of the r.m.s. values of current and voltage and the cosine of the phase angle
      between them, calculated for each phase. It is usually expressed in kW:'
