      at metering conditions into a mass, or * the measured mass into a volume at
      metering conditions, or * the measured mass into a volume at base conditions,
      or * the volume at metering conditions or the measured mass of a mixture of
      pure ethanol (ethyl alcohol) and water into a volume or the mass of pure ethanol
      contained in that mixture, bytaking account of the characteristics of the liquid
      emperature, pressure, density, relative density, etc.) measured using associated
      measuring devices, or stored in a memory. The ratio of the converted quantity
      to the quantity at metering conditions is referred to as the "conversion factor."'
