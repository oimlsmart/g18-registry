    clause: '2.11'
    link: https://www.oiml.org/en/files/pdf_R/r112-e94.pdf
    g18_entry: '01483'
    definition: the range of concentrations or mass flow rates of a sample component
      over which a change in sample amount produces a measurable change in the detector
      signal output. Its value is the ratio of the upper limit of detection to the
      detection limit
    notes: []
    consistency: pending
    consistency_reason: ''
  - edition: '2010'
    publication: OIML D 22:1991
    publication_id: OIML D022:1991
    tc_sc: TC16/SC4
    year: 1991
    clause: '3.7'
    link: https://www.oiml.org/en/files/pdf_D/d022-e91.pdf
    g18_entry: '00152'
    definition: the range of concentrations over which a detectable change in output
      signal is produced by an incremental change in concentration of a substance.
      The lower limit is given by the detection limit, and the upper limit occurs
      at the point of detector saturation. The value of the dynamic range is expressed
      by the ratio of the upper to the lower limit and is larger than or equal to
      the linear range
    notes: []
    consistency: pending
    consistency_reason: ''
