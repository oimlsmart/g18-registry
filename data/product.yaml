    definition: all of the prepackage that is not packing material
    definition_paragraphs:
    - text: all of the prepackage that is not packing material
      sources: []
    notes:
    - Product includes liquids or gasses that were put in the prepackage together
      with the product and that are not intended to be left over after use of the
      product (e.g. air in chocolate mousse).
    - Product includes liquids or gasses that were not put in the prepackage with
      the product and that are intended to be left over after use of the product (e.g.
      liquid in mozzarella cheese, air in hair gel).
    - Product includes liquids or gasses that were not put in the prepackage with
      the product and that are not intended to be left over after use of the product
      (e.g. curdling of yoghurt or honey).
