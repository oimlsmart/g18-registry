    definition: "(u legally relevant parameter with a value that depends on the individual
      instrument. Such parameters comprise calibration parameters (e.g. span adjustments
      or corrections) and configuration parameters (e.g. maximum capacity, minimum
      capacity, units of measurement, etc.). They are adjustable or selectable only
      in a special operational mode of the instrument. They may be classified as those
      that should be secured nalterable) and those that may be accessed (settable
      parameters) by an authorized person"
