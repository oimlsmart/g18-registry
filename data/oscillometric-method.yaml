    definition: method that estimated systolic, diastolic and mean arterial pressure
      during the slow inflation or deflation of an occluding cuff at the brachial
      artery
    notes:
    - 'Note: During the inflation and deflation of the cuff small pressure changes
      (oscillations) occur in the cuff as a result of the arterial blood pressure
      pulses. These oscillations, which first increase and then decrease, are detected
      and stored together with the corresponding cuff pressure values in the measurement
      system. With these stored values the systolic, diastolic and mean arterial blood
      pressure values can be mathematically derived using an appropriate algorithm.
      It is possible to carry out the measurement during the inflation phase.'
