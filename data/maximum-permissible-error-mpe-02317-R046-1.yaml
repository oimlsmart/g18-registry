    definition: extreme value of measurement error, with respect to a known reference
      quantity value, permitted by specifications or regulations for a given measurement,
      measuring instrument or measuring system
    notes:
    - 'Note 1: Usually, the term “maximum permissible errors” or “limits of errors”
      is used where there are two extreme values. Note 2: The term “tolerance” should
      not be used to designate “maximum permissible error”. [OIML V 2-200:2012, 4.26]
      Note 3: In this Recommendation, the maximum permissible error is a combination
      of the base maximum permissible error and the maximum permissible error shift
      as described in Annex B. Note 4: For the application of this Recommendation,
      “specifications or regulations” means: the provisions contained in this Recommendation,
      and the terms “measuring instrument” and “measuring system” mean: electricity
      meter.'
