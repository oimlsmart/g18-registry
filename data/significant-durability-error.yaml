    definition: durability error exceeding the value specified in the applicable Recommendation
    notes:
    - 'Note:Some durability errors exceeding the value specified may still be considered
      not significant. The applicable Recommendation shall state when such exception
      applies. For example, the occurrence of one or some of the following errors
      may be acceptable: (a)the indication cannot be interpreted, memorized or transmitted
      as a measurement result; (b)the indication implies the impossibility to perform
      any measurement; (c)the indication is so obviously wrong that it is bound to
      be noticed by all those interested in the result of the measurement; or (d)a
      durability error cannot be detected and acted upon due to a breakdown of the
      appropriate durability protection facility.'
    examples: []
    consistency: pending
    consistency_reason: ''
