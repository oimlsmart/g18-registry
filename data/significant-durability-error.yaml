    definition: durability error greater than the value specified in the relevant
      The relevant Recommendation may specify Recommendation
    notes:
    - 'that durability errors are not significant, even when they exceed the value
      defined in 3.12, in the following cases: (a) The indication cannot be interpreted,
      memorized or transmitted as a measurement result; (b) The indication implies
      the impossibility to perform any measurement; (c) The indication is so obviously
      wrong that it is bound to be noticed by all those intereste in the result of
      the measurement; or (d) A durability error cannot be detected and acted upon
      due to a breakdown of the appropriate durability protection facility.'
    examples: []
    consistency: pending
