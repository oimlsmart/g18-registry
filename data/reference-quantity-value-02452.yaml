    notes:
    - A reference quantity value can be a true quantity value of a measurand, in which
      case it is unknown, or a conventional quantity value, in which case it is known.
    - A reference quantity value with associated measurement uncertainty is usually
      provided with reference to a) a material, e.g. a certified reference material,
      b) a device, e.g. a stabilized laser, c) a reference measurement procedure,
      d) a comparison of measurement standards. In this Recommendation, the PMB of
      the whole-grain CRM is the reference quantity value used to assess the measurement
      accuracy at verification and to assess the accuracy of calibrations at type
      evaluation. Where a CRM is not used, the reference quantity value is the mean
      PMB at reference conditions prior to a test.
