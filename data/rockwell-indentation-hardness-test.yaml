    g18_entry: '00379'
    definition: mechanical test in which an indenter of a specified size and shape
      (diamond spheroconical or a steel or tungsten-carbide ball) is forced into the
      surface of a test material
    notes:
    - Initially, a preliminary force F0 is applied to the indenter. The force on the
      indenter is increased in a specified manner by an additional force F1 to achieve
      the total force F then the additional force F1 is removed and the force on the
      indenter is returned to the preliminary force F
    - 0. The depth of indentation is measured before and after application of the
      additional force F1, while maintaining the preliminary force F0 (see Annex A).
      A Rockwell hardness value for the test material is derived from the difference
      in the indentation depths (see Fig. 1).
