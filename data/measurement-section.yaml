    notes:
    - Its starting and end points are defined such that the measured speed value refers
      to the average speed on the measurement section.
    - In a manual measurement, the measured vehicle drives on the measurement section
      after the measurement is triggered. In an automatic measurement, the measured
      vehicle exits the measurement section at the trigger line.
