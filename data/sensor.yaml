    definition: 'element of a meter that is directly affected by a phenomenon, body
      or substance carrying a quantity to be measured [SOURCE: ISO/IEC Guide 99:2007/OIML
      V 2-200:2012 (VIM) 3.8, [1], modified — “meter” replaces “measuring system”;original
      note removed; original examples removed, “Note” added]'
    definition_paragraphs:
    - text: 'element of a meter that is directly affected by a phenomenon, body or
        substance carrying a quantity to be measured [SOURCE: ISO/IEC Guide 99:2007/OIML
        V 2-200:2012 (VIM) 3.8, [1], modified — “meter” replaces “measuring system”;original
        note removed; original examples removed, “Note” added]'
      sources: []
    notes:
    - 'Note: For a water meter, the sensor may be a disc, piston, wheel or turbine
      element, the electrodes on an electromagnetic meter, or another element. The
      element senses the flow rate or volume of water passing through the meter and
      is referred to as a “flow sensor” or “volume sensor”.'
    note_paragraphs:
