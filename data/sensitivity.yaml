  - edition: 202X
    publication: OIML R 82:2006
    publication_id: OIML R082:2006
    tc_sc: TC16/SC3
    year: 2006
    clause: '3.13'
    link: https://www.oiml.org/en/files/pdf_R/r082-e06.pdf
    g18_entry: '01057'
    definition: 'Output signal per unit mass of the sample component of interest in
      the carrier gas. It is expressed in either one of the two following ways: 3.13.1
      With a concentration-dependent detector, the instrument sensitivity, S, is expressed
      as: A · mL · g-1, or V · mL · g-1, and by the equation: S = P · F/ M where:
      P = the peak area, F = the carrier gas flow rate, M = the mass of the sample
      in the carrier gas. With the units: A = amperes, mL = millilitres, g = grams,
      V = volts. 3.13.2 With a mass flow rate dependent detector, the instrument sensitivity,
      S, is expressed in: A · s · g-1, or V · s · g-1, and by the equation: S = P/
      M where the symbols have the same definitions as in 3.13.1, with the additional
      unit of: s = seconds.'
    notes:
    - 'Note: Peak area is independent of broadening effects caused by variables such
      as column temperature, eluent flow rate, and rate of sample injection. From
      this standpoint, therefore, the peak area is a more satisfactory analytical
      parameter than peak height. On the other hand, peak heights are more easily
      measured and, for narrow peaks, more accurately determined. Many modern chromatographic
      instruments are equipped with electronic integrators that provide precise measurements
      of relative peak areas.'
    examples: []
    source:
    consistency: pending
    consistency_reason: ''
