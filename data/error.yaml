    notes:
    - Note:The presented VIM definition of (measurement) error is often interpreted
      as the definition for an absolute error. However, when expressing a parameter
      as a percentage or in dB this definition could also be applied to a relative
      error. Since in all cases in this document the errors are expressed in relative
      values it was decided that a separate definition for a relative error is not
      needed.
