    g18_entry: '03562'
    definition: laboratory performing certain or all test on type of measuring instrument.
      A Test Laboratory is designated by an OIML Issuing Authority and accepted by
      the OIML-CS Management Committee
    notes:
    - 'Note 1: A Test Laboratory may be an internal Test Laboratory of an OIML Issuing
      Authority, a third-party Test Laboratory or Manufacturer’s Test Laboratory (MTL).
      Note 2:  The OIML Issuing Authority, and not the Test Laboratory, is responsible
      for issuing the OIML type evaluation report. Note 3: In the OIML-CS the term
      “Test Laboratory” is used instead of the term “Testing Laboratory”.'
