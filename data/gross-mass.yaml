    g18_entry: '01630'
    definition: the gross mass is the mass of the liquid determined by the measuring
      instrument (measured mass) as well as the mass of the liquid below the transducer
      and includes water and sediment entrained in the liquid. It does not include
      the mass of vapor above the liquid, the mass of the floating roof (if fitted),
      nor the mass of the free bottom sediment and water
