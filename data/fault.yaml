    definition: difference between the error of indication and the intrinsic error
      ofa measuring instrument
    notes:
    - 1. Principally, a fault is the result of an undesired change of data contained
      in or flowing through an electronic measuring instrument.
    - 2. From the definition it follows that in this Recommendation, a "fault" is
      a numerical value which is expressed either in a unit of measurement or as a
      relative value, for instance in %.
