    g18_entry: '03705'
    definition: closeness of agreement between a measured quantity value and a true
      quantity value of the measurand
    notes:
    - 'Note 1: The concept of ‘measurement accuracy’ is not a quantity and is not
      given a numerical quantity value. A measurement is said to be more accurate
      when it offers a smaller measurement error. Note 2:The term “measurement accuracy”
      should not be used for measurement trueness and the term “measurement precision”
      should not be used for “measurement accuracy”, which, however, is related to
      both concepts. Note 3:‘Measurement accuracy’ is sometimes understood as closeness
      of agreement between measured quantity values that are being attributed to the
      measurand.'
