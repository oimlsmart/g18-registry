    g18_entry: '02498'
    definition: fluid that is put in the prepackage together with the product, either
      separated from, in or surrounding the product, and that is intended to be left
      over after use of the product, except for items naturally in the product
    notes:
    - Note 1:For the purpose of this Recommendation a fluid includes either a liquid,
      semi-liquid or frozen liquids, ora gas or a mixture of gasses, whether under
      positive, negative or atmospheric pressure, or a combination of both a) and
      b). Note 2:The term “use” includes consumption. Note 3:A medium is sometimes
      also referred to as a “liquid packing medium”. Note 4:A medium can be separated
      from the product and other solid items that were put in the prepackage by measuring
      procedures in Annex C and Annex D. Note 5:A medium also includesthe liquid mediums
      as specified in Clause 4.3.3 of the CODEX STAN 1-1985 “Labelling of prepackaged
      foods” which covers foods on which the drained mass must be marked, and the
      ice-glaze as specified in CODEX standards on ice-glazed foods.
