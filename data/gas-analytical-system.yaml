    g18_entry: '02752'
    definition: assembly to carry out specified gas analytical measurements [ISO 7504:2001]
      [16]
    notes:
    - Note:In this Recommendation, a gas analytical system means a system that continuously
      measures the volume fraction of CO (carbon monoxide), NO (nitrogen monoxide
      ), NO2 (nitrogen dioxide), or sum of nitrogen oxides (NOx), or measures only
      CO or only NO and NO2, or NOx by analyzing the gas samples taken directly from
      the smokestack or gas pipe in industry. This system includes a means for sampling
      and sample preparation (in the case of extractive sampling), a gas analyzer,
      a means for adjusting zero (gas analyzer), a means for adjusting the gas analyzer
      using a calibration gas mixture, a means for the accumulation, processing and
      storage of measurement results, a means for the control and adjustment of the
      main components of the system, an interface to connect devices measuring the
      gas flow parameters of exhaust emissions, and gas and electric lines of communication.
