    notes:
    - EXAMPLE Human serum with assigned quantity value for the concentration of cholesterol
      and associated measurement uncertainty stated in an accompanying certificate,
      used as a calibrator or measurement trueness control material.
    - '"Documentation" is given in the form of a "certificate" (see ISO Guide 31:2000).'
    - Procedures for the production and certification of certified reference materials
      are given, e.g. in ISO Guide 34 and ISO Guide 35. 5.14 (6.14)
    - In this definition, "uncertainty" covers both "measurement uncertainty" and
      "uncertainty associated with the value of a nominal property", such as for identity
      and sequence. "Traceability" covers both "metrological traceability of a quantity
      value" and "traceability of a nominal property value".
    - Specified quantity values of certified reference materials require metrological
      traceability with associated measurement uncertainty (Accred. Qual. Assur.:2006)[45].
    - ISO/REMCO has an analogous definition (Accred. Qual. Assur.:2006)[45] but uses
      the modifiers "metrological" and "metrologically" to refer to both quantity
      and nominal property. Refer to Annex B for guidelines on producing whole-grain
      CRMs. Further general information is in OIML D 18:2008.'
    note_paragraphs:
    - text: EXAMPLE Human serum with assigned quantity value for the concentration
        of cholesterol and associated measurement uncertainty stated in an accompanying
        certificate, used as a calibrator or measurement trueness control material.
      sources: []
    - text: '"Documentation" is given in the form of a "certificate" (see ISO Guide
        31:2000).'
      sources: []
    - text: Procedures for the production and certification of certified reference
        materials are given, e.g. in ISO Guide 34 and ISO Guide 35. 5.14 (6.14)
      sources: []
    - text: In this definition, "uncertainty" covers both "measurement uncertainty"
        and "uncertainty associated with the value of a nominal property", such as
        for identity and sequence. "Traceability" covers both "metrological traceability
        of a quantity value" and "traceability of a nominal property value".
      sources: []
    - text: Specified quantity values of certified reference materials require metrological
        traceability with associated measurement uncertainty (Accred. Qual. Assur.:2006)[45].
      sources: []
    - text: ISO/REMCO has an analogous definition (Accred. Qual. Assur.:2006)[45]
        but uses the modifiers "metrological" and "metrologically" to refer to both
        quantity and nominal property. Refer to Annex B for guidelines on producing
        whole-grain CRMs. Further general information is in OIML D 18:2008.'
      sources: []
