    g18_entry: '02782'
    definition: "{closeness of agreement between a measured quantity value and a true
      quantity value of a measurand [VIM, 2.13}"
    notes:
    - "{NOTE 1 The concept ‘measurement accuracy’ is not a quantity and is not given
      a numerical quantity value. A measurement is said to be more accurate when it
      offers a smaller measurement error. NOTE 2 The term “measurement accuracy” should
      not be used for measurement trueness and the term “measurement precision” should
      not be used for ‘measurement accuracy’, which, however, is related to both these
      concepts. NOTE 3 ‘Measurement accuracy’ is sometimes understood as closeness
      of agreement between measured quantity values that are being attributed to the
      measurand.}"
