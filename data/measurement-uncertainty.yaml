    g18_entry: '03268'
    definition: non-negative parameter characterizing the dispersion of the quantity
      values being attributed to a measurand, based on the information used
    definition_paragraphs:
    - text: non-negative parameter characterizing the dispersion of the quantity values
        being attributed to a measurand, based on the information used
      sources:
      - kind: vim
        relationship: identical
        modification:
        ref_source: OIML V 2-200:2012
        ref_id: '2.26'
        is_vimline: true
    notes:
    - Measurement uncertainty includes components arising from systematic effects,
      such as components associated with corrections and the assigneted quantity values
      of measurement standards, as well as the definitional uncertainty components
      are incorporated.
    - The parameter may be, for example, a standard deviation called standard measurement
      uncertainty (or a specified multiple of it), or the half-width of an interval,
      having a stated coverage probability.
    - Measurement uncertainty comproses, in general, many components. Some of these
      may be evaluated by Type A evaluation of measurement uncertainty from the statistical
      distribution of the quantity values form series of measurements and can be characterized
      by standard deviations. The other components, which may be evaluated by Type
      B evaluation of measurement uncertainty, can also be characterized by standard
      deviations, evaluated form probability density function based on experience
      or other information.
    - In general, for given set of information, it is understood that the measurement
      uncertainty is associated with a stated quantity value attributed to the measurand.
      A modification of this value results in a modification of the associated uncertatinty.
