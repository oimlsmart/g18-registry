    g18_entry: '00875'
    definition: "- - Instrument that requires the intervention of an operator during
      (1) Deciding that the weighing result is the weighing process to decide that
      the weighing result is acceptable Anon-automatic weighing instrument may be:
      graduated or non-graduated; or self-indicating, semi-self-indicating or non-self-indicating"
    notes:
    - acceptable includes any intelligent action by the operator that affects the
      result, such as taking an action when an indication is stable or adjusting the
      mass of the weighed load, and to make a decision regarding the acceptance of
      each weighing result on observing the indication or releasing a print out. A
      non- automatic weighing process allows the operator to take an action (i.e.
      adjust the load adjust the unit price, determine that the load i acceptable,
      etc.) which influences the weighing result in the case where the weighing result
      is not acceptable. (2) In case of doubt as to whether an instrument is a non-automatic
      weighing instrument or an automatic weighing instrument, the definitions for
      automatic weighing instruments given in OIML Recommendations R 50, R 51, R 61,
      R 106, R 107 and R 134 have higher priority than the criteria of Note 1 above.
      (3) In this Recommendation a non-automatic weighing instrument is called an
      "instrument".
