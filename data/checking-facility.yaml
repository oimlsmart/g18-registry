    g18_entry: '02437'
    definition: 'facility that is incorporated in a meter and which enables significant
      fault(s) (3.2.8) to be detected and acted upon [SOURCE: OIML D11:2013, 3.19,
      [8], , modified — “meter” replaces “measuring instrument”; “Note 3” added]'
    notes:
    - 'Note 1:Typically, checking facilities detect and act upon: incorrect function
      of specific device of the meter, and/or disturbed communication between specific
      devices of the meter. Note 2:“Act upon” refers to any adequate response by measuring
      instrument (for example: a luminous signal, an acoustic signal, interruption
      or blocking of the measurement process, etc.). Note 3: The checking of a transmission
      device aims to verify whether all the information which is transmitted (and
      only that information) is fully received by the receiving equipment.'
    consistency: pending
