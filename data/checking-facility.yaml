    g18_entry: 02331-R046-1
    definition: facility that is incorporated in a measuring instrument and which
      enables significant faults to be detected and acted upon
    notes:
    - 'Note 1: “Acted upon” refers to any adequate response by the measuring instrument
      (luminous signal, acoustic signal, prevention of the measurement process, etc.).
      [OIML V 1:2013, 5.07] Note 2: For the application of this Recommendation, the
      term “measuring instrument” means: electricity meter and the action following
      the detection of a significant fault should be either to stop measuring and
      record the time and duration of the stop, or record the time and duration of
      the fault and the amount of energy measured during the fault. Note 3Faults that
      are detected and acted upon by means of a checking facility shall not be considered
      as significant faults.'
    consistency: pending
    consistency_reason: ''
