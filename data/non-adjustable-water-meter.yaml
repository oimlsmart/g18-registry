    g18_entry: '03703'
    definition: water meter (3.1.1) whose indication cannot be altered in any way
      (e.g. without changing the internal dimensions and/or method of operation),
      and which has no adjustment device (3.1.6) or correction device (3.1.7)
    notes:
    - This category should also include mechanical meters with an internal adjustment
      device where the adjustment cannot be altered at initial verification stage
      as the meter would need to be dismantled.
    - The meter should not have a correction device, i.e. the indicating device of
      the meter should either be purely mechanical or be electronic but with a constant
      multiplying factor applied to the indication and set to the same value for all
      meters (such as a device which counts the number of rotations of the shaft and
      multiplies by a fixed value to give total volume passed).
