    g18_entry: '02116'
    definition: instrument for measuring the refractive index. If the refractometer
      is provided with another scale or an additional scale calibrated in the units
      of the fraction of soluble dry substances in aqueous solutions, which are recognized
      by the international organizations, e.g. the International Sucrose Mass Fraction
      Scale, %mass (Brix), then the refractometer shall be accompanied by a conversion
      table for the refractive index values
