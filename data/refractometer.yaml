    g18_entry: '01406'
    definition: refractometers are instruments for measuring the refractive index.
      If they are provided with appropriate scales, they are used to determine the
      content of sugar in liquids, in which case the relation between the mass fraction
      and the refractive index shall have been specified (see 3)
