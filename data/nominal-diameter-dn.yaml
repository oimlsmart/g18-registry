    g18_entry: '02420'
    definition: alphanumeric designation of size for components of a pipework system,
      which is used for reference purposes
    notes:
    - 'Note 1:The nominal diameter is expressed by the letters DN followed by a dimensionless
      whole number which is indirectly related to the physical size, in millimetres,
      of the bore or outside diameter of the end connections. Note 2:The number following
      the letters DN does not represent a measurable value and should not be used
      for calculation purposes except where specified in the relevant standard. Note
      3: In those standards which use the DN designation system, any relationship
      between DN and component dimensions should be given, e.g. DN/OD or DN/ID.'
