      meet approved type
    notes:
    - 'Note: The concept of CTT as considered in this Dokumnet refers to a systematic
      pre-market conformity assessment procedure applicable to measuring instruments.
      It should not be confused with ‘market surveillance’ activities, which are sometimes
      performed as part of a systematic program but often are performed ad-hoc by
      public authorities based on risk assessment and market intelligence, e.g. user
      complaints. ‘Market surveillance’ is further discussed in Annex 7.'
