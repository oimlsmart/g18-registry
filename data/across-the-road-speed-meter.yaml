    notes:
    - A variation of measurement angle can lead to negative or positive residual cosine
      error for this calss of speed meters.
    - A speed meter that is installed above the road and compensates for cosine error
      is also referred to as across-the road speed meter, for simplicity.
    - Typical examples are most Doppler-radar based speed meters, 2D and 3D laser
