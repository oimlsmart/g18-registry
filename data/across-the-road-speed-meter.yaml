    definition: speed meter with compensation for cosine error using a measured value
      of the measurement angle,a configured value of the expected measurement angle
      or combination of the two
    notes:
    - 'Note 1:  A variation of measurement angle can lead to negative or positive
      residual cosine error for this calss of speed meters. Note 2:A speed meter that
      is installed above the road and compensates for cosine error is also referred
      to as across-the road speed meter, for simplicity. Note 3: Typical examples
      are most Doppler-radar based speed meters, 2D and 3D laser ecanners and image-nbased
      speed meters.'
