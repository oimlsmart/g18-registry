    g18_entry: '02177'
    definition: data set containing the public key belonging to a measuring instrument
      or a person plus a unique identification of the subject, e.g. serial number
      of the measuring instrument or name or Personal Identification Number (PIN)
      of the person. The data set is signed by a trustworthy institution with an electronic
      signature. The assignment of a public key to a subject can be verified by using
      the public key of the trustworthy institution and decrypting the signature of
      the certificate
