    definition: 'The method of calculating instrument resolution is dependent on the
      instrument’s ion analyzer. Two common methods for determining the ratio of m
      to Δm (m/Δm) are: - m is the mass of a component comprising the first peak of
      a doublet, and Δm is the difference in the mass of the two peaks. The doublet
      shall be separated by a valley, the value of which shall not exceed 10 % of
      the value of the highest peak (m/Δm is constant (sector type)). - m is the mass
      of a sample component within a peak and Δm is the full width at half maximum
      (FWHM) of the peak (Δm is constant, (quadrupole type)). Thus m/Δm decreases
      as mass decreases. With this type of instrument unit resolution, one can separate
      each mass from the next integer mass, i.e. one can distinguish mass 50 from
      mass 51, and distinguish mass 1000 from mass 1001'
