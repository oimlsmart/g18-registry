    definition: practice and process of applying statutory and regulatory structure
      and enforcement to metrology
    notes:
    - Note 1 The scope of legal metrology may be different from country to country.
      Note 2 Legal metrology includes setting up legal requirements, control/conformity
      assessment of regulated products and regulated activities, supervision of regulated
      products and of regulated activities, and providing the necessary infrastructure
      for the traceability of regulated measurements and measuring instruments to
      SI or national standards. Note 3 There are also regulations outside the area
      of legal metrology pertaining to the accuracy and correctness of measurement
      methods.
