    clause: 2.1.9
    link:
    g18_entry: '02502'
    definition: single item for presentation as such to a consumer, consisting of
      a product and its packing material, made up before being offered for sale and
      in which the quantity of the product has a predetermined value, whether the
      packing material encloses the product completely or only partially, but in any
      case in such a way that the actual quantity of product cannot be altered without
      the packing material either being opened or undergoing a perceptible modification
    notes:
    - 'Note 1:  For the purpose of this Recommendation “prepackage” includes those
      prepackages marked with a constant nominal quantity and thus excludes those
      prepackages marked with random nominal quantities. The term “predetermined value”
      refers to the value determined prior to the prepackage being offered for sale.
      Note 2:  The actual quantity of some products may change after packing due to
      desiccation or chemical reactions.'
    consistency: pending
