    g18_entry: '02155'
    definition: '- G.3-2 decision of legal relevance, based on the evaluation report
      that For the purpose of this Document, the "type the type of a measuring instrument
      complies with the relevant statutory requirements and is suitable for use in
      the regulated area in such a way that it is expected to provide reliable measurement
      results over a defined period of time'
    notes:
    - approval" is named "type evaluation". Consequently "Type evaluation" in the
      sense of this Document includes examination, tests and decision.
    consistency: partial
    consistency_reason: Missing comma after 'evaluation report' changes the sentence
      structure, making it ambiguous whether the decision or the report contains the
      compliance determination.
