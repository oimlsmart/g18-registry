    notes:
    - "{NOTE Relevant statistical terms are given in ISO 5725-1:1994 and ISO 5725-2:1994.}
      In this Recommendation, the reproducibility of measurements between units of
      the same type of instrument under reference conditions is assessed by the standard
      deviation of differences (SDDI). The reproducibility of measurements from one
      instrument when selected influence factors are varied is assessed by the magnitude
      of the error shift or fault."
