    g18_entry: '03199'
    definition: 'group of load cells which for the purposes of type evaluation are
      considered as one family and that are of: the same material or combination of
      materials (for example mild steel, stainless steel or aluminum); the same design
      of the measurement technique (for example strain gauges bonded to metal); when
      used, the same principle used to attach the strain gauge to the load cell; the
      same method of construction (for example shape, sealing of strain gauges, mounting
      method, manufacturing method); the same set of specifications (for example output
      rating, input impedance, supply voltage, cable details); and one or more load
      cell groups where all load cells within the group possess identical metrological
      characteristics (as listed in 5.1.5 – including: class; nLC; temperature rating,
      etc.).'
    notes:
    - 'Note:  The examples provided are not intended to be limiting.'
