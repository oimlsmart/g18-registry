    g18_entry: '02864'
    definition: weigher designed such that it causes a vertical flow of bulk product
      to effect a centripetal force propotionally to the mass of the product passing
      along the circular arched surface of force receptor (2.2.1)
    notes:
    - 'Note 1: Not allchuteweighters meet the definition stated in this Recommendation.
      Note 2: Arched chute weighers are designed such that a vertical flow of bulk
      products uses the action of gravity to effect a centripetal force proportional
      to the mass of the product. Note 3: the force receptore of an arched chute weigher
      is equipped with a circular arched surface. Note 4: arched chute weighers that
      horizontal flows, using only centripetal force, are not covered by definition
      of a weighing instrument in 2.1.1 and therefore are not covered by this Recommendation.'
