    definition: digital device equipped with operator interface(s) such as keypad,
      mouse, touch-screen, etc. used to monitor the operations of the instrument,
      often equipped with a display to provide the feedback to the operator, such
      as weighing results, mass flowrate, etc. transmitted via the digital interface
      of a weighing module or an analog data processing device
    notes: []
    consistency: partial
    consistency_reason: Publication narrows scope to weighing-specific examples and
      changes the purpose from 'operate the instrument' to 'monitor operations,' and
      makes the display optional instead of required.
