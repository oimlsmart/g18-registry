    clause: T.4.3.9
    link: https://www.oiml.org/en/files/pdf_R/r051-1-e06.pdf
    g18_entry: '00662'
    definition: 'Fault greater than the verification scale interval, e. A significant
      fault does not include: - faults arising from simultaneous and mutually independent
      causes in the instrument or in its checking facility; - faults that imply it
      is impossible to perform a measurement; - faults that are so serious they will
      inevitably be noticed by all those interested in the measurement; or - transitory
      faults that are momentary variations in the indications that cannot be interpreted,
      memorized or transmitted as a measurement result.'
    notes: []
    consistency: pending
