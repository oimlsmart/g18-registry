    g18_entry: '00741'
    definition: 'Fault greater than the load cell verification interval, v. The following
      are not considered significant faults, even when they exceed the load cell verification
      interval, v: • faults arising from simultaneous and mutually independent causes;
      • faults implying the impossibility to perform any measurements; • faults being
      so serious that they are bound to be noticed by all interested in the result
      of measurement; and • transitory faults being momentary variations in the load
      cell output which cannot be interpreted, memorized or transmitted as a measurement
      result'
