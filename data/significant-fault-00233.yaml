  - publication: OIML R 139:2007
    publication_id: OIML R139:2007
    tc_sc: ''
    year: 2007
    clause: T.3.12
    link: https://www.oiml.org/en/files/pdf_R/r139-e07.pdf
    g18_entry: '02021'
    definition: 'for the mass, a fault the magnitude of which is greater than the
      larger of these two values: - one tenth of the magnitude of the maximum permissible
      error for the measuring system and for the measured mass, - the minimum specified
      mass deviation. For the price to pay, the price corresponding to the significant
      fault for the mass. The following are not considered to be significant faults:
      - faults arising from simultaneous and mutually independent causes in the measuring
      instrument itself or in its checking facilities, - transitory faults being momentary
      variations in the indication, which cannot be interpreted, memorized or transmitted
      as a measurement result, - faults implying the impossibility of performing any
      measurement.'
    notes:
    - No fault is allowed for the unit price.
    consistency: pending
    consistency_reason: ''
