    link:
    g18_entry: 02231-D011
    definition: influence quantity having a value within the limits specified in the
      applicable Recommendation but outside the specified rated operating conditions
      of the measuring instrument
    notes:
    - 'Note 1:These limits to be specified in the applicable Recommendation shall
      be based on the probability of occurrence of the disturbing phenomenon within
      the environment of the measuring instrument. Note 2:A disturbance typically
      is of stochastic nature. Note 3:  In case the listed rated operating conditions
      of a measuring instrument do not include a range for the specific influence
      quantity, the influence quantity is qualified as being a disturbance.'
