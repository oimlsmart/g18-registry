      sources: []
    notes:
    - Types of adjustment of a measuring system include zero adjustment of a measuring
      system, offset adjustment, and span adjustment (sometimes called gain adjustment).
    - Adjustment of a measuring system should not be confused with calibration, which
      is a prerequisite for adjustment.
    - After an adjustment of a measuring system, the measuring system must usually
      be recalibrated.
