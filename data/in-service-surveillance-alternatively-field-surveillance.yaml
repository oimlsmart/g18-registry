    notes:
    - 'Note 1:“Field surveillance” should not only cover the instrument itself but
      also the user, to evaluate the proper use of the instrument. Note 2:on the relation
      between market surveillance and field surveillance: Both types of surveillance
      can in principle overlap but where a conformity assessment of a measuring instrument
      indicates that the findings can be directly related to the responsibilities
      of manufacturers or their representatives, the matter should be dealt with by
      market surveillance'
