    year: 2007
    clause: T.2.3
    link: https://www.oiml.org/en/files/pdf_R/r139-e07.pdf
    g18_entry: '02004'
    definition: operating mode of a self-service arrangement in which the supplier
      is present and controls the authorization for the delivery
    notes:
    - 1. In attended service mode, the settlement of the transaction takes place before
      the customer leaves the site of the delivery.
    - 2. A transaction is settled when the parties interested in the transaction have
      made their agreement known (explicitly or implicitly) as regards the amount
      of the transaction. This may be a payment, signing a credit card voucher, signing
      a delivery order, etc.
    - '3. The parties interested in a transaction may be the parties themselves or
      their representatives (for example: an employee in a filling station, or the
      driver of a truck).'
    - 4. In attended service mode the measurement operation ends at the moment settlement
      of the transaction takes place.
