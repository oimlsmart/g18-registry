    clause: 3.2.36
    link:
    g18_entry: '03253'
    definition: measured quantity value minus reference quantity value adapted from
      [OIML V-2-200:2012, 2.16]
    notes:
    - 'Note 1: The concept of ‘measurement error’ can be used both when there is single
      reference quantity value to refer to, which occurs if a calibration is made
      by means of measurement standard with a measured quantity value having a negligible
      measurement uncertainty or if a conventinal quantity value is given, in which
      case the measurement error is known, and if a measurand is supposed to be represented
      by a unique true quantity calue or set of true quantity calues of negligibly
      range, in which case the measurement error is not known. Note 2: Measurement
      implies compsrison of quantities or counting entities. Note 3: See Annex C for
      clarification regarding measurement-related terms.'
