    link: https://www.oiml.org/en/files/pdf_R/r107-1-e07.pdf
    g18_entry: '01314'
    definition: measuring instrument used to determine the mass of a body by using
      the action of gravity on this body. The instrument may also be used to determine
      other quantities, magnitudes, parameters or characteristics related to the determined
      mass. According to its method of operation, a weighing instrument is classified
      as an automatic weighing instrument or a non- automatic weighing instrument.
    notes:
    - In this Recommendation "mass" (or "weight value") is preferably used in the
      sense of "conventional mass" or "conventional value of the result of weighing
      in air" according to OIML R 111 [5] and OIML D 28 [27], whereas "weight" is
      preferably used for an embodiment (or material measure) of mass that is regulated
      in regard to its physical and metrological characteristics.
