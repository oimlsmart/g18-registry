    definition: any written, printed, or graphic matter affixed to, applied to, attached
      to, blown into, formed or molded into, embossed on, or appearing upon a package
      containing any product for purposes of branding, identifying, or giving any
      information with respect to the product or to the contents of the package; however,
      an inspector's tag or other non-promotional text affixed to or appearing on
      a product shall not be deemed to be a label that requires the label information
      prescribed by this Recommendation
