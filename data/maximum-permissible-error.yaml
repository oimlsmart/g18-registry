    definition: extreme value of measurement error, with respect to a known reference
      quantity value, permitted by specifications or regulations for a given measurement,
      measuring instrument, or measuring system
    notes:
    - Usually the term "maximum permissible errors" or "limits of error are used,
      where there are two extreme values.
    - The term "tolerance should not be used to designate "maximum permissible error".
    - Maximum permissible errors for type approval and initial verification and verification
      after repair od refractometer are defined in 5.2.1. Maximum permissible errors
      forrefractometer in service are defined in 5.2.2.
