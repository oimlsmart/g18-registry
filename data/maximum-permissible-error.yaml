    definition: extreme value of error of indication, with respect to a known reference
      quantity value, permitted by specifications or regulations for a given measurement,
      measuring instrument, or measuring system
    notes:
    - 'Note: The unit of the error of indication and of the MPE can be either absolute
      (e.g. km/h) or relative (e.g. %). Error values in relative units given in this
      recommendation are always relative to the absolute value of the reference (not
      to the value of the device under test or to any other value).'
