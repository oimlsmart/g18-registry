    definition: software means which is added to software or data with the purpose
      to verify the origin of softwareor data, i.e., to ptove their authenticity,
      or to check that the software or data are unchanged, i.e., to prpove their integrity
    notes:
    - 'Note 1: For didital signin, a public key system is used in general, i.e., a
      part of keys where only one needs to be kept privet/secret; the other may be
      public. Note 2: The private key is used when software or data are secured. The
      public key is used when software or data are verified before use. Note 3: The
      verifying instance may require a cryptographic certificate of the securing instance
      (see 3.2.9) to be sure of the authenticity of the public kay. Note 4: A digital
      signature provides nonrepudiation: the signee cannot deny signing the software
      or data.'
