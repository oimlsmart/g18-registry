    g18_entry: '01053'
    definition: 'Manifestation of variation in the gas chromatograph output signal
      not associated with changes in chromatographic conditions (e.g. temperature
      gradient), which can be divided into two components: 3.9.1 Short-term noise,
      which includes all observable random variations of the signal from the detector
      or other components having a frequency of the order of one or more cycles per
      minute. 3.9.2 Drift, i.e. the average slope of the baseline signal measured
      over a minimum of half an hour'
