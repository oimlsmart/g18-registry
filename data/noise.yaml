    definition: 'a measure of variation in the detector signal; it can be divided
      into three components: short-term noise includes all observable random variations
      of the detector signal having a frequency of the order of 10–2 Hz to 10–1 Hz
      (one or more cycles per minute) and should be measured peak to peak long-term
      noise includes all observable random variations of the detector signal with
      frequencies between 0.1 Hz and 1.0 Hz drift is the average slope of the baseline
      signal measured over a minimum period of one-half hour.'
    definition_paragraphs:
    - text: 'a measure of variation in the detector signal; it can be divided into
        three components: short-term noise includes all observable random variations
        of the detector signal having a frequency of the order of 10–2 Hz to 10–1
        Hz (one or more cycles per minute) and should be measured peak to peak long-term
        noise includes all observable random variations of the detector signal with
        frequencies between 0.1 Hz and 1.0 Hz drift is the average slope of the baseline
        signal measured over a minimum period of one-half hour.'
      sources: []
    notes:
    - 'Note: Althoug long-term noise can occur at any time during an analysis, it
      can be mistaken for a late-eluting peak. Earlier eluting peaks are usually sharper
      and less easily confused with long-term noise.'
