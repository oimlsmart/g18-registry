    g18_entry: '00695'
    definition: characteristic quantity showing the type (revolutions of the driving
      shaft or impulses) and the frequency of signals at which the speedometer must
      indicate a speed of 60 km/h. The speedometer constant may be expressed in revolutions
      per minute, rev/min, or in impulses per minute, imp/min. The speedometer constant
      is numerically equal to odometer constant k when the same driving system is
      used for both instruments
