      sources: []
    notes:
    - The relevant information may consist of e.g. measurement uncertainty, date and
      time of measurement, number of measurement, identification of sensor and in
      the case where price calculation is part of legally relevant software, unit
      price and price to pay.
    - The measurement result (including the measured quantity value according to V
      2:200:2012) is used for the legally relevant purpousae, e.g. conclusion of transaction.
    - See Annex C for clarification regarding measurement-related terms.
