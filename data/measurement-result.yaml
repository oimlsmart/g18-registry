    clause: '3.14'
    link:
    g18_entry: '03260'
    definition: 'In the contex of this Document, result is defined as: set of quantity
      values being attributed to a measurand together with any other available relevant
      information (VIM3, 2.9)'
    definition_paragraphs:
    - text: 'In the contex of this Document, result is defined as: set of quantity
        values being attributed to a measurand together with any other available relevant
        information (VIM3, 2.9)'
      sources: []
    notes:
    - A measurement result generally contains "relevant information" about the set
      of quantity values, such that some may be more representative of the measureand
      than others. This may be expressed in the form of probability density function
      (PDF).
    - A measurement result is generally expressed as single measured quantity value
      and a measurement uncertainty. If the measurement uncertainty is considered
      to be negligible for some purpose, the measurement result may be expressed as
      single measured quantity value. In many fields, this is the common way of expressing
      a measurement result.
    - In the traditional literature and in the precious edition of the VIM, measurement
      result was defined as value attributed to a measurand and explained to mean
      an indication, or an uncorrected result, or a correxcted result, according to
      the context.
