    g18_entry: '01722'
    definition: the indication of a measuring instrument minus the true value of VIM:1993,
      5.20. the corresponding input quantity
    notes: []
    consistency: partial
    consistency_reason: An erroneous inline reference 'VIM:1993, 5.20.' is embedded
      mid-definition, disrupting the intended meaning of the sentence.
    related:
