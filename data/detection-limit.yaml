  - edition: '2010'
    publication: OIML D 22:1991
    publication_id: OIML D022:1991
    tc_sc: TC16/SC4
    year: 1991
    clause: '3.6'
    link: https://www.oiml.org/en/files/pdf_D/d022-e91.pdf
    g18_entry: '00151'
    definition: the concentration of a substance that will yield a mean output signal
      equal to three times the mean short term noise level, as determined on a statistical
      basis
    notes:
    - "(1) The detection limit is sometimes defined as an output signal equal to some
      other multiple (e.g., two or ten) of the noise level [2]. The noise level is
      the random background output signal of an instrument when sampling a blank or
      clean filtered air. (2) In this Document, the concentration of an airborne pollutant
      in either a gas or vapor phase is most often expressed in terms of the volume
      fraction of the pollutant in air: parts- per-million (ppm) [v/v (10-6)]. Conditions
      of temperature and pressure shall be specified for conversions to units of mass
      per unit volume (usually mg/m3). Standard conditions may be specified, and for
      temperature may be 0 oC or 20 oC and for pressure one atmosphere or 101 325
      Pa."
    examples: []
    consistency: pending
    consistency_reason: ''
