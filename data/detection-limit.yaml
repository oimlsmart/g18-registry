    clause: '3.2'
    link: https://www.oiml.org/en/files/pdf_R/r123-e97.pdf
    g18_entry: '01606'
    definition: 'concentration of an element which provides an output signal equivalent
      to three times the standard deviation of the background. It is the minimum quantity
      of an element that can be detected. For this Recommendation, it may be derived
      from the statistical variation in the background using the following equation:
      D = 3 (B/t)1/2/S where: D = detection limit (unit of concentration); B = background
      (counts per second); t = measurement time (seconds); S = sensitivity (counts
      per second per unit of concentration).'
    notes:
    - When applied in a measurement method or for an analysis, the limit of quantitation
      of t instrument is an important parameter. It is defined as being a value equal
      to 10 times standard deviation of the background and al would include the variations
      associated wit sampling and analysis
    examples: []
    consistency: pending
