    definition: contact sensor or non-contact (optical or mechanical) sensor that
      is used to detect the position of the displacer
    notes:
    - 'Note: A mechanical detector using a cantilever is often employed in certain
      pipe provers. The lever is pushed by the displacer and actuates an electrical
      switch installed outside the pipe wall. A linear encoder is used for a piston
      prover to transmit a pulse signal that is proportional to the displacement of
      the displacer.'
