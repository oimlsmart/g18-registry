      ISO 10012-1 [11])
    notes:
    - (1) Metrological confirmation normally includes calibration, any necessary adjustment
      or repair and subsequent recalibration, as well as any required sealing and
      labeling. (2) In this Document, this term is referred to as "confirmation".
