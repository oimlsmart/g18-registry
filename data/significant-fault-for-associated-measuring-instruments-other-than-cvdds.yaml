    definition: fault, the magnitude of which is greater than half of the magnitude
      of the maximum permissible error for the relevant measurand. However a fault,
      the magnitude of which is smaller than 2 scale intervals of the associated measuring
      instrument is never considered as a significant fault
    notes:
    - for associated measuring instruments other than CVDDs this concept applies to
      the whole associated measuring instrument, or to the electronic part only, according
