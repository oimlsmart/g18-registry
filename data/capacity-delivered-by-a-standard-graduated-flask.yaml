    g18_entry: '00399'
    definition: the capacity « delivered » by a standard graduated flask, corresponding
      to a scale mark (designated capacity « Ex »), is equal to the volume of water
      delivered by the flask at the reference temperature, when filled to this scale
      mark and then emptied (see method described in appendix A, point A.3.2.)
    notes:
    - The expression « filled to this scale mark », means that the meniscus formed
      by the water in the neck of the flask, is so adjusted that th horizontal plane
      passing through the upper edge of the scale mark, is tangential to the lowest
      point of the meniscus, when viewed in this plane.
