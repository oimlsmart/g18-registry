    g18_entry: '01600'
    definition: a transaction is settled when the parties interested in the transaction
      have made their agreement known (explicitly or implicitly) regarding the amount
      of the transaction. This may be a payment, signing a credit card voucher, signing
      a delivery order, etc. The parties interested in a transaction may be the parties
      themselves or their representatives (for example, the employee in afilling station
      or the driver of a truck)
