    g18_entry: '02043'
    definition: part of the measuring system that receives the output signals from
      the flow measuring device(s) or from another calculator and possibly from the
      associated measuring instruments, transforms them, and, if appropriate, stores
      the results in memory until they are used. In addition, the calculator may be
      capable of transmitting and receiving data from peripheral equipment
    notes:
    - A measuring system may have one, two or more calculators, for instance a mechanical
      calculator to produce the volume at metering conditions and which transmits
      the value to a mechanical indicating device, an electronic calculator which
      also calculates the volume at metering conditions, associated with an electronic
      indicating device, and another one to calculate the converted value.
    consistency: pending
