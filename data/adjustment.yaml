    g18_entry: '02783'
    definition: "{adjustment of a measuring system adjustment set of operations carried
      out on a measuring system so that it provides prescribed indications corresponding
      to given values of a quantity to be measured [VIM, 3.11]}"
    notes:
    - "{NOTE 1 Types of adjustment of a measuring system include zero adjustment of
      a measuring system, offset adjustment, and span adjustment (sometimes called
      gain adjustment). NOTE 2 Adjustment of a measuring system should not be confused
      with calibration, which is a prerequisite for adjustment. NOTE 3 After an adjustment
      of a measuring system, the measuring system must usually be recalibrated.} For
      protein measuring instruments, alignment with the reference method is typically
      accomplished through a bias adjustment to the calibration equation. Other mechanisms
      that require a higher level of expertise (e.g. adjustment of the calibration
      equation slope, modification of hardware/ software components or settings) may
      be less accessible due to increased security requirements."
    consistency: pending
