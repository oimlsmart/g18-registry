    g18_entry: '02508'
    definition: The factor calculated using the Student’s t inverse cumulative distribution
      function (tp, n-1) with p as the probability equivalent to 0.005 and (n–1) as
      the degrees of freedom, and a finite population correction factor (N–n)/(N–1)
      with n as the sample size and N as the inspection lot size
    notes:
    - Note 1:SCF always has a positive sign because tp, n-1 has a negative sign for
      p = 0.005. Note 2:See Annex F, F.3 for the statistical background to SCF.
