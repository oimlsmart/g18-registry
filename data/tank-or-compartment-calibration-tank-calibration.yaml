    g18_entry: '02251'
    definition: set of operations to determine the capacity of a tank or compartment,
      using methods satisfying the technical and metrological requirements, such as
      measurement at one or several filling levels by means of geometric size measurement,
      gravimetric, or volumetric method. The gravimetric method determines the volume
      of liquid in the tank by means of weighing; the volumetric method determines
      the volume of liquid in the tank by means of measuring the volume of liquid
      entered in or emptied from the tank
