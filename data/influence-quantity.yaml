    clause: '3.15'
    link:
    g18_entry: '02229-D011'
    definition: quantity that, in a direct measurement, does not affect the quantity
      that is actually measured, but affects the relation between the indication and
      the measurement result [VIM 2.52][VIML 0.07
    notes:
    - 'Note:An influence quantity is not related to the measurand but is a quantity
      that affects the result of the measurement as indicated by the equipment under
      test (EUT). Example: The temperature of a measuring instrument is an influence
      quantity, but the temperature of the measured object (used as a reference for
      determining the fault or the error) is not. This influence of the environment
      on this measured object may need to be taken into consideration as a contributor
      in the definition of the measurand.'
    consistency: pending
    consistency_reason: ''
