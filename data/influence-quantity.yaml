    link:
    g18_entry: 02322-R046-1
    definition: quantity that, in direct measurement, does not affect the quantity
      that is actually measured, but affects the relation between the indication and
      the measurement result [OIML V2:200:2012, 2.52]
    notes:
    - 'Note 1: The concept of influence quantity is understood to include values associated
      with measurement standards, reference materials and reference data upon which
      the result of a measurement may depend, as well as phenomena such as short-term
      measuring instrument fluctuations and quantities such as ambient temperature,
      barometric pressure and humidity. Note 2: In the GUM [5], the concept ‘influence
      quantity’ is defined as in the second edition of the VIM, covering not only
      the quantities affecting the measuring system, as in the definition above, but
      also those quantities that affect the quantities actually measured. Also, in
      the GUM this concept is not restricted to direct measurements. [OIML V2-200:2012,
      2.52, Note 2]'
    consistency: pending
    consistency_reason: ''
