    g18_entry: '02600'
    definition: quantity value provided by a measuring instrument or a measuring system
      [VIM 4.1]
    notes:
    - Note 1:An indication may be presented in visual or acoustic form or may be transferred
      to another device. An indication is often given by the position of a pointer
      on the display for analog outputs, a displayed or printed number for digital
      outputs, a code pattern for code outputs, or an assigned quantity value for
      material measures. Note 2:An indication and a corresponding value of the quantity
      being measured are not necessarily values of quantities of the same kind.
