    definition: need or expectation that is stated, generally implied or obligatory
      (1) "Generally implied" means that it is [ISO 9000:2000, 3.1.2]
    notes:
    - custom or common practice for the organization, its customers and other interested
      parties, that the need or expectation under consideration is implied. (2) A
      qualifier can be used to denote a specific type of requirement, e.g. product
      requirement, quality management requirement, customer requirement. (3) A specified
      requirement is one which is stated, for example, in a document. (4) Requirements
      can be generated by different interested parties.
