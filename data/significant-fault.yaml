    definition: 'a fault the magnitude of which is greater than 20 % of the maximum
      permissible error (mpe) for the measured quantity. The following are not considered
      to be significant faults: • faults arising from simultaneous and mutually independent
      causes in the measuring instrument itself or in its checking facility; • transitory
