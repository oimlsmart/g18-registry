    definition: fault exceeding the applicable fault limit value (VIML 5.14)
    notes:
    - 'Note: For particular types of measuring instruments some faults exceeding the
      fault limit may not be considered a significant fault; the applicable Recommendation
      shall state when such exception applies. For example, the occurrence of one
      or some of the following faults may be acceptable: faults arising from simultaneous
      and mutually independent causes originating in a measuring instrument or in
      its checking facilities; faults implying the impossibility to perform any measurement;
      transistory faults being momentary variations in the indication, which cannot
      be interpreted, memorized or transmitted as a measurement result; faults giving
      rise to variations in the measurement result that are serious enough to be noticed
      by all those interested in the measurement result; The Recommendation may specify
      the nature of these variations.'
