    g18_entry: '02086'
    definition: 'The following faults are not considered as significant: - faults
      resulting from simultaneous causes independent from each other within the instrument
      itself or within its checking facility; - temporary faults resulting from momentary
      indication variations, but which cannot be interpreted, stored or transmitted
      as measurement results.'
