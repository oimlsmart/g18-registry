    g18_entry: '00806'
    definition: "• • • • fault greater than 0.25 of the maximum permissible deviation
      of each fill for in-service inspection as specified in 2.2.2, for a fill equal
      to the minimum capacity or rated minimum fill respectively of the filling instrument.
      The following are not considered to be significant faults, even when they exceed
      the value defined above: faults arising from simultaneous and mutually independent
      causes in the instrument; faults that imply it is impossible to perform a measurement;
      faults that are so serious that they will inevitably be noticed by those interested
      in the measurement; and transitory faults that are momentary variations in the
      indications or operation that can not be interpreted, memorized ortransmitted
      as a measurement result"
    definition_paragraphs:
    - text: "• • • • fault greater than 0.25 of the maximum permissible deviation
        of each fill for in-service inspection as specified in 2.2.2, for a fill equal
        to the minimum capacity or rated minimum fill respectively of the filling
        instrument. The following are not considered to be significant faults, even
        when they exceed the value defined above: faults arising from simultaneous
        and mutually independent causes in the instrument; faults that imply it is
        impossible to perform a measurement; faults that are so serious that they
        will inevitably be noticed by those interested in the measurement; and transitory
        faults that are momentary variations in the indications or operation that
        can not be interpreted, memorized ortransmitted as a measurement result"
      sources: []
    notes:
    - For filling instruments where the fill may be greater than one load, the value
      of the significant fault applicable for a test on one static load shall be calculated
      in accordance with the test procedures in A.6.1.3.
    note_paragraphs:
    - text: For filling instruments where the fill may be greater than one load, the
