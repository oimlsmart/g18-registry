    year: 2004
    clause: '3.10'
    link: https://www.oiml.org/en/files/pdf_D/d011-e04.pdf
    g18_entry: '00233'
    definition: fault greater than the value specified in the relevant Recommendation
    notes:
    - 'The relevant Recommendation may specify that the following faults are not significant,
      even when they exceed the value defined in 3.10: (a) Faults arising from simultaneous
      and mutually independent causes (e.g. EM fields and discharges) originating
      in a measuring instrument or in its checking facilities; (b) Faults implying
      the impossibility to perform any measurement; (c) Transitory faults being momentary
      variations in the indication, which cannot be interpreted, memorized or transmitted
      as a measurement result; (d) Faults giving rise to variations in the measurement
      result that are serious enough to be noticed by all those interested in the
      measurement result; the relevant Recommendation may specify the nature of these
      variations.'
    consistency: pending
    consistency_reason: ''
  - edition: '2010'
    publication: OIML R 61-1:2004
    publication_id: OIML R061-1:2004
    tc_sc: ''
    year: 2004
    clause: T.4.2.6
    link: https://www.oiml.org/en/files/pdf_R/r061-1-e04.pdf
    g18_entry: '00806'
    definition: "• • • • fault greater than 0.25 of the maximum permissible deviation
      of each fill for in-service inspection as specified in 2.2.2, for a fill equal
      to the minimum capacity or rated minimum fill respectively of the filling instrument.
      The following are not considered to be significant faults, even when they exceed
      the value defined above: faults arising from simultaneous and mutually independent
      causes in the instrument; faults that imply it is impossible to perform a measurement;
      faults that are so serious that they will inevitably be noticed by those interested
      in the measurement; and transitory faults that are momentary variations in the
      indications or operation that can not be interpreted, memorized ortransmitted
      as a measurement result"
    notes:
    - For filling instruments where the fill may be greater than one load, the value
      of the significant fault applicable for a test on one static load shall be calculated
      in accordance with the test procedures in A.6.1.3.
    consistency: pending
