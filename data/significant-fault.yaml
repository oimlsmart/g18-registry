    link: https://www.oiml.org/en/files/pdf_D/d011-e04.pdf
    g18_entry: '00233'
    definition: fault greater than the value specified in the relevant Recommendation
    definition_paragraphs:
    - text: fault greater than the value specified in the relevant Recommendation
      sources: []
    notes:
    - 'The relevant Recommendation may specify that the following faults are not significant,
      even when they exceed the value defined in 3.10: (a) Faults arising from simultaneous
      and mutually independent causes (e.g. EM fields and discharges) originating
      in a measuring instrument or in its checking facilities; (b) Faults implying
      the impossibility to perform any measurement; (c) Transitory faults being momentary
      variations in the indication, which cannot be interpreted, memorized or transmitted
      as a measurement result; (d) Faults giving rise to variations in the measurement
      result that are serious enough to be noticed by all those interested in the
      measurement result; the relevant Recommendation may specify the nature of these
      variations.'
    note_paragraphs:
    - text: 'The relevant Recommendation may specify that the following faults are
        not significant, even when they exceed the value defined in 3.10: (a) Faults
        arising from simultaneous and mutually independent causes (e.g. EM fields
        and discharges) originating in a measuring instrument or in its checking facilities;
        (b) Faults implying the impossibility to perform any measurement; (c) Transitory
        faults being momentary variations in the indication, which cannot be interpreted,
        memorized or transmitted as a measurement result; (d) Faults giving rise to
        variations in the measurement result that are serious enough to be noticed
        by all those interested in the measurement result; the relevant Recommendation
        may specify the nature of these variations.'
      sources: []
