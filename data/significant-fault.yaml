    link: https://www.oiml.org/en/files/pdf_R/r076-1-e06.pdf
    g18_entry: '00982'
    definition: 'fault greater than stem:[e]. The following are not considered to
      be significant faults, even when they exceed stem:[e]: - faults arising from
      simultaneous and mutually independent causes in the instrument; - faults implying
      the impossibility to perform any measurement; - faults being so serious that
      they are bound to be noticed by all those interested in the result of measurement;
      or - transitory faults, being momentary variations in the indication which cannot
      be interpreted, memorized or transmitted as a measurement result'
    notes:
    - at appropriate to the partial weighing .
