    g18_entry: '02656'
    definition: 'group of gas meters of different sizes and/or different flow rates,
      in which all the meters shall have the following characteristics: the same manufacturer,
      geometric similarity of the measuring part, the same metering principle, roughly
      the same ratios Qmax/Qmin and Qmax/Qt, the same accuracy class, the same electronic
      device (see 0) for each meter size and using the same metrological software
      routines (if applicable) for those components that are critical to the performance
      of the meter, a similar standard of design and component assembly, and the same
      materials for those components that are critical to the performance of the meter.'
