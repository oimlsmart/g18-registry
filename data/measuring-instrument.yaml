    clause: 3.1.4
    link:
    g18_entry: '02204'
    definition: In this Document, the term “measuring instrument” covers measuring
      instruments in the sense of the VIM (see VIM, 3.1), as well as measuring systems
      (VIM, 3.2), material measures (VIM, 3.6) and any part of a measuring instrument
      or measuring system which can be the object of specific requirements and of
      a specific evaluation of conformity. VIM 3.1 – measuring instrument device used
      for making measurements, alone or in conjunction with one or more supplementary
      devices
    definition_paragraphs:
    - text: In this Document, the term “measuring instrument” covers measuring instruments
        in the sense of the VIM (see VIM, 3.1), as well as measuring systems (VIM,
        3.2), material measures (VIM, 3.6) and any part of a measuring instrument
        or measuring system which can be the object of specific requirements and of
        a specific evaluation of conformity. VIM 3.1 – measuring instrument device
        used for making measurements, alone or in conjunction with one or more supplementary
        devices
      sources: []
    notes:
    - A measuring instrument that can be used alone is a measuring system.
    - A measuring instrument may be an indicating measuring instrument or a material
      measure.
    - VIM 3.2 – measuring system set of one or more measuring instruments and often
      other devices, including any reagent and supply, assembled and adapted to give
      information used to generate measured quantity values within specified intervals
      for quantities of specified kinds
    - A measuring system may consist of only one measuring instrument.
    - VIM 3.6 – material measure measuring instrument reproducing or supplying, in
      a permanent manner during its use, quantities of one or more given kinds, each
      with an assigned quantity value
    note_paragraphs:
    - text: A measuring instrument that can be used alone is a measuring system.
      sources: []
    - text: A measuring instrument may be an indicating measuring instrument or a
        material measure.
      sources: []
    - text: VIM 3.2 – measuring system set of one or more measuring instruments and
