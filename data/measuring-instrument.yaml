      or measuring system which can be the object of specific requirements and of
      a specific evaluation of conformity. VIM 3.1 – measuring instrument device used
      for making measurements, alone or in conjunction with one or more supplementary
      devices
    notes:
    - Note 1 A measuring instrument that can be used alone is a measuring system.
      Note 2 A measuring instrument may be an indicating measuring instrument or a
      material measure. VIM 3.2 – measuring system set of one or more measuring instruments
      and often other devices, including any reagent and supply, assembled and adapted
      to give information used to generate measured quantity values within specified
      intervals for quantities of specified kinds Note A measuring system may consist
      of only one measuring instrument. VIM 3.6 – material measure measuring instrument
      reproducing or supplying, in a permanent manner during its use, quantities of
      one or more given kinds, each with an assigned quantity value
    consistency: partial
