    link:
    g18_entry: '03184'
    definition: subject to legal control
    notes:
    - 'Note 1:  If a measuring instrument is under legal control, then the measurement
      data, software and parameters that are critical for the metrological characteristics,
      including the metrological functions, securing and protection features, and/or
      for the completion of the transaction, are also under legal control. Note 2:  The
      relevant Recommendations define what is legally relevant and formulate requirements
      to those items (e.g., data, functions, securing and protection features and
      information for the completion of the transaction).'
    consistency: pending
