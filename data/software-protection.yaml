    link:
    g18_entry: '03523'
    definition: 'protection of measuring instrument or component software or data
      domain by a hardware or software implemented seal with the intention of making
      an intervention impossible or evident Examples: A hardware seal on a measuring
      instrument’s housing needs to be removed, damaged or broken to obtain access
      to change software. A software seal in a measuring instrument record events,
      i.e. either a non-resettable counter is inctemented each time an event occurs,
      see 3.2.21, or a data file, counting timestamped information, records the event,
      see 3.2.1. The interface of measuring instrument is physically sealed, so that
      accessing that interface can only be achived by breaking, removing or damaging
      the seal. adapted from [OIML V 1:2022, 6.04]'
    notes:
    - 'Note: See 6.2.3.5.'
