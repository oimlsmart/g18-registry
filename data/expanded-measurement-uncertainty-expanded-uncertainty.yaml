      in ,easurement model and on the selected coverage probability.
    - The term "factor" in this definition refers to a coverage factor.
    - Expanded measurement uncertainty is termed "overall uncertainty" in paragraph
      5 of Recommendation INC-1 (1980) (see the GUM) and simply "uncertainty" pn IEC
