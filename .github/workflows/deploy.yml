name: Deploy registry site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Vocab repo is checked out at $github_workspace/vocab (sibling-style
      # layout that the migrate script expects).
      VOCAB_ROOT: ${{ github.workspace }}/vocab/datasets
      # relaton-data-oiml is checked out at $github_workspace/relaton-data-oiml.
      # The export script reads its index-v2.yaml for TC/SC enrichment.
      RELATON_ROOT: ${{ github.workspace }}/relaton-data-oiml
    steps:
      - uses: actions/checkout@v7

      # Check out the vocab repo alongside so the migration can read
      # g18-2010 + g18-202X concept files at build time. Public repo, no
      # token needed. Derived data (data/*.yaml, web/src/data/*.json) is
      # regenerated in CI from this + the committed LLM consistency cache.
      - name: Checkout vocab repo
        uses: actions/checkout@v7
        with:
          repository: oimlsmart/vocab
          path: vocab
          ref: main

      # Check out relaton-data-oiml for TC/SC committee assignments.
      # The export script enriches each publication with its TC/SC from
      # the relaton bibliographic data.
      - name: Checkout relaton-data-oiml
        uses: actions/checkout@v7
        with:
          repository: relaton/relaton-data-oiml
          path: relaton-data-oiml
          ref: main

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      # Pre-site calculations. Migration reads sibling vocab/datasets,
      # consistency applies the committed LLM cache (no API calls),
      # export transforms data/ -> web/src/data/*.json.
      - name: Migrate concepts from vocab
        run: bundle exec ruby scripts/migrate_from_vocab.rb

      - name: Apply cached consistency classifications
        run: bundle exec ruby scripts/check_consistency.rb

      - name: Export JSON data
        run: bundle exec ruby scripts/export_for_vite.rb

      - name: Build static site (Astro)
        working-directory: web
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
